<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap');
:root {
  --verde:#3a7d5a; --verde-c:#e8f4ed; --amarillo:#f0c84b;
  --naranja:#e8824a; --crema:#faf7f2; --texto:#1a2e22;
  --gris:#8a9e93; --blanco:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--crema);color:var(--texto);min-height:100vh;}
header{background:var(--verde);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15);}
header h1{font-family:'Fraunces',serif;font-weight:300;font-size:21px;color:#fff;}
header h1 em{font-style:italic;color:var(--amarillo);}
.hbtns{display:flex;gap:8px;}
.hbtn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;transition:.2s;}
.hbtn:hover{background:rgba(255,255,255,.25);}
.hbtn.on{background:var(--amarillo);color:var(--texto);border-color:var(--amarillo);font-weight:500;}
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--verde-c);padding:0 12px;gap:2px;overflow-x:auto;}
.tab{padding:11px 14px;font-size:13px;font-weight:500;color:var(--gris);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.2s;}
.tab.on{color:var(--verde);border-bottom-color:var(--verde);}
.main{padding:14px;max-width:480px;margin:0 auto;}
.vista{display:none;} .vista.on{display:block;}
/* dia card */
.dia-card{background:#fff;border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:0 4px 20px rgba(26,46,34,.08);}
.dia-head{background:var(--verde);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.dia-nom{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:#fff;}
.dia-num{background:var(--amarillo);color:var(--texto);border-radius:50%;width:27px;height:27px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.comida{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--verde-c);gap:10px;cursor:default;transition:.15s;}
.comida:last-child{border-bottom:none;}
.comida.tiene-receta{cursor:pointer;}
.comida.tiene-receta:hover{background:var(--verde-c);}
.c-hora{font-size:11px;color:var(--gris);font-weight:500;min-width:40px;text-align:center;background:var(--verde-c);border-radius:7px;padding:3px 4px;}
.c-tipo{font-size:10px;font-weight:700;color:var(--verde);text-transform:uppercase;letter-spacing:.5px;min-width:70px;}
.c-nom{font-size:13px;flex:1;line-height:1.3;}
.c-ico{font-size:15px;color:var(--naranja);}
/* compra */
.compra-top{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 4px 20px rgba(26,46,34,.08);display:flex;align-items:center;justify-content:space-between;}
.compra-top h2{font-family:'Fraunces',serif;font-size:19px;font-weight:600;}
.badge{background:var(--verde);color:#fff;border-radius:20px;padding:4px 12px;font-size:12px;}
.cat-blk{background:#fff;border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:0 4px 20px rgba(26,46,34,.08);}
.cat-tit{background:var(--verde-c);padding:9px 14px;font-size:11px;font-weight:700;color:var(--verde);text-transform:uppercase;letter-spacing:.7px;}
.ci{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--verde-c);gap:10px;cursor:pointer;transition:.15s;}
.ci:last-child{border-bottom:none;}
.ci.done{opacity:.42;}
.ci.done .ci-nom{text-decoration:line-through;}
.ci-box{width:21px;height:21px;border:2px solid var(--verde);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:.15s;}
.ci.done .ci-box{background:var(--verde);color:#fff;}
.ci-nom{flex:1;font-size:13.5px;}
.ci-cant{font-size:12px;color:var(--gris);font-weight:500;}
/* modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,46,34,.6);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.on{display:flex;}
.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding-bottom:30px;animation:up .3s ease;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.m-handle{width:38px;height:4px;background:#ddd;border-radius:2px;margin:11px auto 0;}
.m-head{padding:14px 18px 11px;border-bottom:1px solid var(--verde-c);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.m-tit{font-family:'Fraunces',serif;font-size:19px;font-weight:600;flex:1;line-height:1.25;}
.m-x{background:var(--verde-c);border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;color:var(--verde);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.m-body{padding:14px 18px;}
.m-sec{margin-bottom:18px;}
.m-sec h4{font-size:11px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.ing{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--verde-c);font-size:13px;}
.ing:last-child{border-bottom:none;}
.ing-c{font-weight:600;color:var(--verde);text-align:right;min-width:90px;}
.pasos{counter-reset:p;}
.paso{padding:9px 0 9px 34px;position:relative;border-bottom:1px solid var(--verde-c);font-size:13px;line-height:1.5;counter-increment:p;}
.paso:last-child{border-bottom:none;}
.paso::before{content:counter(p);position:absolute;left:0;top:9px;background:var(--verde);color:#fff;width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{background:#fff3e0;color:#b85c00;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:500;}
/* fab */
.fab{position:fixed;bottom:22px;right:20px;background:var(--naranja);color:#fff;border:none;border-radius:26px;padding:13px 20px;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;box-shadow:0 6px 18px rgba(232,130,74,.4);display:flex;align-items:center;gap:7px;z-index:150;transition:.2s;}
.fab:hover{transform:translateY(-2px);}
.toast{position:fixed;top:76px;left:50%;transform:translateX(-50%);background:var(--texto);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.on{opacity:1;}
</style>
</head>

// RENDER TABS
function renderTabs() {
  var html = '';
  for (var i = 0; i < 7; i++) {
    html += '<div class="tab' + (i === diaIdx ? ' on' : '') + '" data-i="' + i + '">' + DIAS[i] + '</div>';
  }
  document.getElementById('tabs').innerHTML = html;
  document.getElementById('tabs').onclick = function(e) {
    var t = e.target;
    if (t.classList.contains('tab')) {
      diaIdx = parseInt(t.getAttribute('data-i'));
      renderTabs();
      renderDia();
    }
  };
}

// RENDER DÍA
function renderDia() {
  var d = PLANTILLAS[orden[diaIdx]];
  var tipos = [
    {tipo:'Desayuno', dat:d.desayuno},
    {tipo:'Media mañana', dat:d.media},
    {tipo:'Comida', dat:d.comida},
    {tipo:'Merienda', dat:d.merienda},
    {tipo:'Cena', dat:d.cena}
  ];
  var html = '<div class="dia-card"><div class="dia-head"><div class="dia-nom">' + DIAS[diaIdx] + '</div><div class="dia-num">' + (diaIdx + 1) + '</div></div>';
  for (var i = 0; i < tipos.length; i++) {
    var t = tipos[i];
    var tieneR = t.dat.r ? true : false;
    var rKey = t.dat.r || '';
    html += '<div class="comida' + (tieneR ? ' tiene-receta' : '') + '"' + (tieneR ? ' data-r="' + rKey + '"' : '') + '>';
    html += '<div class="c-hora">' + t.dat.h + '</div>';
    html += '<div class="c-tipo">' + t.tipo + '</div>';
    html += '<div class="c-nom">' + t.dat.p + '</div>';
    if (tieneR) html += '<div class="c-ico">📖</div>';
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('vistaMenu').innerHTML = html;
  document.getElementById('vistaMenu').onclick = function(e) {
    var el = e.target;
    while (el && el !== this) {
      if (el.classList.contains('tiene-receta')) {
        abrirReceta(el.getAttribute('data-r'));
        return;
      }
      el = el.parentElement;
    }
  };
}

// RENDER COMPRA
function renderCompra() {
  document.getElementById('badgeSem').textContent = 'Semana ' + semana;
  var html = '';
  for (var c = 0; c < COMPRA.length; c++) {
    var cat = COMPRA[c];
    html += '<div class="cat-blk"><div class="cat-tit">' + cat.cat + '</div>';
    for (var i = 0; i < cat.items.length; i++) {
      var k = '' + c + '_' + i;
      var done = checks[k] ? true : false;
      html += '<div class="ci' + (done ? ' done' : '') + '" data-k="' + k + '">';
      html += '<div class="ci-box">' + (done ? '✓' : '') + '</div>';
      html += '<div class="ci-nom">' + cat.items[i][0] + '</div>';
      html += '<div class="ci-cant">' + cat.items[i][1] + '</div>';
      html += '</div>';
    }
    html += '</div>';
  }
  document.getElementById('listaCompra').innerHTML = html;
  document.getElementById('listaCompra').onclick = function(e) {
    var el = e.target;
    while (el && el !== this) {
      if (el.classList.contains('ci')) {
        var k = el.getAttribute('data-k');
        checks[k] = !checks[k];
        renderCompra();
        return;
      }
      el = el.parentElement;
    }
  };
}

// ABRIR RECETA
function abrirReceta(nombre) {
  var r = RECETAS[nombre];
  if (!r) return;
  document.getElementById('mTit').textContent = nombre;
  var html = '';
  html += '<div class="m-sec"><h4>Ingredientes</h4>';
  for (var i = 0; i < r.ing.length; i++) {
    html += '<div class="ing"><span>' + r.ing[i][0] + '</span><span class="ing-c">' + r.ing[i][1] + '</span></div>';
  }
  html += '</div>';
  html += '<div class="m-sec"><h4>Preparación</h4><div class="pasos">';
  for (var j = 0; j < r.pasos.length; j++) {
    html += '<div class="paso">' + r.pasos[j] + '</div>';
  }
  html += '</div></div>';
  if (r.alerg) {
    var chips = r.alerg.split(',');
    html += '<div class="m-sec"><h4>Alérgenos</h4><div class="chips">';
    for (var k = 0; k < chips.length; k++) {
      html += '<span class="chip">' + chips[k].trim() + '</span>';
    }
    html += '</div></div>';
  }
  document.getElementById('mBody').innerHTML = html;
  document.getElementById('overlay').classList.add('on');
}

function cerrarOverlay(e) {
  if (e.target === document.getElementById('overlay')) cerrarModal();
}
function cerrarModal() {
  document.getElementById('overlay').classList.remove('on');
}

// NUEVA SEMANA
function nuevaSemana() {
  var a = [0,1,2,3,4,5,6];
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  orden = a;
  semana++;
  checks = {};
  diaIdx = 0;
  renderTabs();
  renderDia();
  renderCompra();
  toast('Nueva semana generada 🎉');
}

function showVista(v) {
  document.getElementById('vistaMenu').className = 'vista' + (v === 'menu' ? ' on' : '');
  document.getElementById('vistaCompra').className = 'vista' + (v === 'compra' ? ' on' : '');
  document.getElementById('tabs').style.display = v === 'menu' ? 'flex' : 'none';
  document.getElementById('btnM').className = 'hbtn' + (v === 'menu' ? ' on' : '');
  document.getElementById('btnC').className = 'hbtn' + (v === 'compra' ? ' on' : '');
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast on';
  setTimeout(function() { t.className = 'toast'; }, 2500);
}

// INIT
renderTabs();
renderDia();
renderCompra();
</script>
