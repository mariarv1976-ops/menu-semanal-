<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Menú Semanal</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Menú">
<meta name="theme-color" content="#3a7d5a">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap');
:root {
  --v:#3a7d5a; --vc:#e8f4ed; --am:#f0c84b; --na:#e8824a;
  --cr:#faf7f2; --tx:#1a2e22; --gr:#8a9e93; --bl:#ffffff;
  --sh:0 4px 20px rgba(26,46,34,.09);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--cr);color:var(--tx);min-height:100vh;padding-bottom:80px;}

/* HEADER */
header{background:var(--v);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15);}
header h1{font-family:'Fraunces',serif;font-weight:300;font-size:20px;color:#fff;letter-spacing:-.3px;}
header h1 em{font-style:italic;color:var(--am);}
.hbtns{display:flex;gap:6px;}
.hbtn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:18px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif;}
.hbtn:hover,.hbtn.on{background:var(--am);color:var(--tx);border-color:var(--am);}

/* NAV TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--vc);padding:0 10px;gap:0;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:10px 13px;font-size:12.5px;font-weight:500;color:var(--gr);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.2s;font-family:'DM Sans',sans-serif;}
.tab.on{color:var(--v);border-bottom-color:var(--v);}

/* MAIN */
.main{padding:12px;max-width:500px;margin:0 auto;}
.vista{display:none;}.vista.on{display:block;}

/* DÍA CARD */
.dia-card{background:#fff;border-radius:16px;margin-bottom:10px;overflow:hidden;box-shadow:var(--sh);}
.dia-head{background:var(--v);padding:11px 15px;display:flex;align-items:center;justify-content:space-between;}
.dia-nom{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:#fff;}
.dia-right{display:flex;align-items:center;gap:8px;}
.dia-num{background:var(--am);color:var(--tx);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.btn-regen{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;}
.btn-regen:hover{background:rgba(255,255,255,.35);}
.comida{display:flex;align-items:center;padding:9px 13px;border-bottom:1px solid var(--vc);gap:9px;transition:.15s;}
.comida:last-child{border-bottom:none;}
.comida.cr{cursor:pointer;}.comida.cr:hover{background:var(--vc);}
.c-h{font-size:10.5px;color:var(--gr);font-weight:500;min-width:38px;text-align:center;background:var(--vc);border-radius:6px;padding:2px 4px;}
.c-t{font-size:9.5px;font-weight:700;color:var(--v);text-transform:uppercase;letter-spacing:.5px;min-width:68px;}
.c-n{font-size:13px;flex:1;line-height:1.3;}
.c-i{font-size:14px;color:var(--na);}

/* BADGE sáb/dom */
.badge-finde{background:#fff3e0;color:#b85c00;font-size:10px;font-weight:600;border-radius:8px;padding:2px 7px;margin-left:6px;}

/* COMPRA */
.compra-top{background:#fff;border-radius:14px;padding:13px 15px;margin-bottom:10px;box-shadow:var(--sh);display:flex;align-items:center;justify-content:space-between;}
.compra-top h2{font-family:'Fraunces',serif;font-size:18px;font-weight:600;}
.badge-sem{background:var(--v);color:#fff;border-radius:18px;padding:4px 11px;font-size:12px;}
.prog-bar{background:#fff;border-radius:14px;padding:10px 15px;margin-bottom:10px;box-shadow:var(--sh);}
.prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--gr);margin-bottom:6px;}
.prog-track{background:var(--vc);border-radius:10px;height:8px;}
.prog-fill{background:var(--v);border-radius:10px;height:8px;transition:width .4s;}
.cat-blk{background:#fff;border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:var(--sh);}
.cat-tit{background:var(--vc);padding:9px 14px;font-size:11px;font-weight:700;color:var(--v);text-transform:uppercase;letter-spacing:.7px;}
.ci{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--vc);gap:10px;cursor:pointer;transition:.15s;}
.ci:last-child{border-bottom:none;}
.ci:hover{background:var(--vc);}
.ci.done{opacity:.4;}
.ci.done .ci-n{text-decoration:line-through;}
.ci-box{width:21px;height:21px;border:2px solid var(--v);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:.15s;}
.ci.done .ci-box{background:var(--v);color:#fff;}
.ci-n{flex:1;font-size:13.5px;}
.ci-c{font-size:12px;color:var(--gr);font-weight:500;}

/* RECETARIO */
.search-bar{background:#fff;border-radius:14px;padding:10px 14px;margin-bottom:10px;box-shadow:var(--sh);display:flex;align-items:center;gap:10px;}
.search-bar input{flex:1;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;background:transparent;color:var(--tx);}
.search-bar input::placeholder{color:var(--gr);}
.filtros{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.ftag{background:#fff;border:1px solid var(--vc);border-radius:18px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--gr);cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif;}
.ftag.on{background:var(--v);color:#fff;border-color:var(--v);}
.rec-card{background:#fff;border-radius:14px;padding:13px 15px;margin-bottom:8px;box-shadow:var(--sh);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:12px;}
.rec-card:hover{background:var(--vc);}
.rec-emoji{font-size:24px;width:40px;text-align:center;}
.rec-info{flex:1;}
.rec-nom{font-size:14px;font-weight:500;line-height:1.3;}
.rec-sub{font-size:11.5px;color:var(--gr);margin-top:2px;}
.rec-tag{font-size:10px;font-weight:600;border-radius:8px;padding:2px 8px;}
.tag-dieta{background:var(--vc);color:var(--v);}
.tag-finde{background:#fff3e0;color:#b85c00;}
.tag-recetario{background:#f3e8ff;color:#6b21a8;}
.rec-arr{color:var(--gr);font-size:16px;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,46,34,.6);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.on{display:flex;}
.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;padding-bottom:30px;animation:up .28s ease;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.m-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:11px auto 0;}
.m-head{padding:14px 18px 10px;border-bottom:1px solid var(--vc);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.m-tit{font-family:'Fraunces',serif;font-size:19px;font-weight:600;flex:1;line-height:1.2;}
.m-x{background:var(--vc);border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;color:var(--v);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.m-body{padding:14px 18px;}
.m-sec{margin-bottom:18px;}
.m-sec h4{font-size:11px;font-weight:700;color:var(--gr);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.ing{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--vc);font-size:13px;align-items:center;}
.ing:last-child{border-bottom:none;}
.ing-c{font-weight:600;color:var(--v);text-align:right;min-width:90px;}
.pasos{counter-reset:p;}
.paso{padding:9px 0 9px 34px;position:relative;border-bottom:1px solid var(--vc);font-size:13px;line-height:1.5;counter-increment:p;}
.paso:last-child{border-bottom:none;}
.paso::before{content:counter(p);position:absolute;left:0;top:9px;background:var(--v);color:#fff;width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{background:#fff3e0;color:#b85c00;border-radius:18px;padding:4px 10px;font-size:11px;font-weight:500;}

/* FAB */
.fab{position:fixed;bottom:20px;right:18px;background:var(--na);color:#fff;border:none;border-radius:26px;padding:13px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 6px 18px rgba(232,130,74,.4);display:flex;align-items:center;gap:6px;z-index:150;transition:.2s;}
.fab:hover{transform:translateY(-2px);}
.fab-hidden{display:none!important;}

/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;padding:9px 18px;border-radius:18px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.on{opacity:1;}

/* empty state */
.empty{text-align:center;padding:40px 20px;color:var(--gr);}
.empty .e-ico{font-size:40px;margin-bottom:10px;}
.empty p{font-size:14px;}
</style>
</head>
<body>

<header>
  <h1>Mi <em>cocina</em></h1>
  <div class="hbtns">
    <button class="hbtn on" id="btnM" onclick="nav('menu')">📅</button>
    <button class="hbtn" id="btnC" onclick="nav('compra')">🛒</button>
    <button class="hbtn" id="btnR" onclick="nav('recetario')">📖</button>
  </div>
</header>

<div class="tabs" id="tabs"></div>

<div class="main">
  <div class="vista on" id="vMenu"></div>
  <div class="vista" id="vCompra">
    <div class="compra-top">
      <h2>Lista de la compra</h2>
      <span class="badge-sem" id="badgeSem">Semana 1</span>
    </div>
    <div class="prog-bar">
      <div class="prog-label"><span>Progreso</span><span id="progTxt">0 / 0</span></div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div id="listaCompra"></div>
  </div>
  <div class="vista" id="vRecetario">
    <div class="search-bar">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar receta..." oninput="renderRecetario()">
    </div>
    <div class="filtros" id="filtros"></div>
    <div id="listaRecetas"></div>
  </div>
</div>

<button class="fab" id="fab" onclick="nuevaSemana()">🔀 Nueva semana</button>

<div class="overlay" id="overlay" onclick="cerrarOverlay(event)">
  <div class="modal" id="modal">
    <div class="m-handle"></div>
    <div class="m-head">
      <div class="m-tit" id="mTit"></div>
      <button class="m-x" onclick="cerrarModal()">✕</button>
    </div>
    <div class="m-body" id="mBody"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>

// DATOS — Para añadir una receta nueva, copia un bloque
// existente dentro de RECETAS y rellena los campos.
// "tipo": "dieta" = cualquier día

// ============================================================
var RECETAS = {

  // ── RECETAS DE LA DIETA (entre semana y finde) ─────────────

  "Ensalada de garbanzos mixta": {
    tipo:"dieta", cat:"ensalada", emoji:"🥗",

    alerg:"Lácteos, frutos secos, moluscos"
  },
  "Bacalao al ajoarriero": {
    tipo:"dieta", cat:"pescado", emoji:"🐟",

    pasos:["Asar las hortalizas troceadas en parrilla con aceite.","Asar el lomo en plancha caliente.","Untar el lomo con majado de ajo y perejil.","Emplatar con la parrillada de verduras."],
    alerg:""

    ing:[["Repollo","1 unidad pequeña"],["Arroz","al gusto"],["Cebolla morada","1 unidad"],["Tomates pelados","4 unidades"],["Pimienta","al gusto"]],

// Historial de últimas 2 semanas para no repetir
function getHistorial() {
  try { return JSON.parse(localStorage.getItem('menuHistorial') || '[]'); }
  catch(e) { return []; }
}
function saveHistorial(h) {
  try { localStorage.setItem('menuHistorial', JSON.stringify(h)); } catch(e){}
}
function guardarSemanaEnHistorial(idx) {
  var h = getHistorial();
  h.push(idx.slice());
  if (h.length > 2) h.shift();
  saveHistorial(h);
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function generarMenuSemana() {
  var hist = getHistorial();
  var usados = [];
  for (var i = 0; i < hist.length; i++) {
    for (var j = 0; j < hist[i].length; j++) usados.push(hist[i][j]);
  }

  // Lunes-viernes: plantillas de entre semana
  var disponSemana = [];
  for (var i = 0; i < IDX_SEMANA.length; i++) {
    if (usados.indexOf(IDX_SEMANA[i]) === -1) disponSemana.push(IDX_SEMANA[i]);
  }
  if (disponSemana.length < 5) disponSemana = IDX_SEMANA.slice(); // reset si no hay suficientes
  disponSemana = shuffle(disponSemana);

  // Sábado-domingo: plantillas de finde
  var disponFinde = [];
  for (var i = 0; i < IDX_FINDE.length; i++) {
    if (usados.indexOf(IDX_FINDE[i]) === -1) disponFinde.push(IDX_FINDE[i]);
  }
  if (disponFinde.length < 2) disponFinde = IDX_FINDE.slice();
  disponFinde = shuffle(disponFinde);

  menuIdx = [
    disponSemana[0], disponSemana[1], disponSemana[2],
    disponSemana[3], disponSemana[4],
    disponFinde[0], disponFinde[1]
  ];
}

  // excluir los ya usados esta semana en otros días

  otros.splice(i, 1);
  var candidatos = [];
  for (var j = 0; j < pool.length; j++) {
    if (otros.indexOf(pool[j]) === -1) candidatos.push(pool[j]);
  }
  if (candidatos.length === 0) candidatos = pool;
  candidatos = shuffle(candidatos);
  menuIdx[i] = candidatos[0];
  renderDia(i);
  toast('Día cambiado 🔄');
}

// ── RENDER MENÚ ─────────────────────────────────────────────
function renderTabs() {
  var html = '';
  for (var i = 0; i < 7; i++) {
    html += '<div class="tab'+(i===diaAct?' on':'')+'" data-i="'+i+'">'+DIAS[i]+'</div>';
  }
  document.getElementById('tabs').innerHTML = html;
  document.getElementById('tabs').onclick = function(e) {
    var t = e.target;
    if (t.classList.contains('tab')) {
      diaAct = parseInt(t.getAttribute('data-i'));
      renderTabs(); renderDia(diaAct);
    }
  };
}

function renderDia(idx) {
  var pl = PLANTILLAS[menuIdx[idx]];
  var esFinde = (idx === 5 || idx === 6);
  var tipos = [
    {tipo:'Desayuno', d:pl.desayuno},
    {tipo:'Media mañana', d:pl.media},
    {tipo:'Comida', d:pl.comida},
    {tipo:'Merienda', d:pl.merienda},
    {tipo:'Cena', d:pl.cena}
  ];
  var html = '<div class="dia-card">';
  html += '<div class="dia-head">';
  html += '<div class="dia-nom">'+DIAS[idx]+(esFinde ? '<span class="badge-finde">fin de semana</span>' : '')+'</div>';
  html += '<div class="dia-right">';
  html += '<button class="btn-regen" data-dia="'+idx+'" title="Cambiar este día">🔄</button>';
  html += '<div class="dia-num">'+(idx+1)+'</div>';
  html += '</div></div>';
  for (var i = 0; i < tipos.length; i++) {
    var t = tipos[i]; var rec = t.d.r || '';
    html += '<div class="comida'+(rec?' cr':'')+'"'+(rec?' data-r="'+rec+'"':'')+' >';
    html += '<div class="c-h">'+t.d.h+'</div>';
    html += '<div class="c-t">'+t.tipo+'</div>';
    html += '<div class="c-n">'+t.d.p+'</div>';
    if (rec) html += '<div class="c-i">📖</div>';
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('vMenu').innerHTML = html;
  document.getElementById('vMenu').onclick = function(e) {
    var el = e.target;
    while (el && el !== this) {
      if (el.classList.contains('btn-regen')) {
        regenDia(parseInt(el.getAttribute('data-dia'))); return;
      }
      if (el.classList.contains('cr')) {
        abrirReceta(el.getAttribute('data-r')); return;
      }
      el = el.parentElement;
    }
  };
}

// ── RENDER COMPRA ────────────────────────────────────────────
function renderCompra() {
  document.getElementById('badgeSem').textContent = 'Semana '+semana;
  var total = 0; var hechos = 0;
  var html = '';
  for (var c = 0; c < COMPRA.length; c++) {
    var cat = COMPRA[c];
    html += '<div class="cat-blk"><div class="cat-tit">'+cat.cat+'</div>';
    for (var i = 0; i < cat.items.length; i++) {
      var k = c+'_'+i; var done = checks[k];
      total++; if (done) hechos++;
      html += '<div class="ci'+(done?' done':'')+'" data-k="'+k+'">';
      html += '<div class="ci-box">'+(done?'✓':'')+'</div>';
      html += '<div class="ci-n">'+cat.items[i][0]+'</div>';
      html += '<div class="ci-c">'+cat.items[i][1]+'</div>';
      html += '</div>';
    }
    html += '</div>';
  }
  document.getElementById('listaCompra').innerHTML = html;
  document.getElementById('listaCompra').onclick = function(e) {
    var el = e.target;
    while (el && el !== this) {
      if (el.classList.contains('ci')) {
        var k = el.getAttribute('data-k');
        checks[k] = !checks[k]; renderCompra(); return;
      }
      el = el.parentElement;
    }
  };
  document.getElementById('progTxt').textContent = hechos+' / '+total;
  var pct = total > 0 ? Math.round(hechos/total*100) : 0;
  document.getElementById('progFill').style.width = pct+'%';
}

// ── RENDER RECETARIO ─────────────────────────────────────────
var CATS = {
  'todo':'Todas',
  'dieta':'🥦 Dieta',
  'finde':'🎉 Finde',
  'recetario':'📚 Recetario',
  'carne':'🥩 Carne',
  'pescado':'🐟 Pescado',
  'ensalada':'🥗 Ensalada',
  'pasta':'🍝 Pasta',
  'arroz':'🍚 Arroz',
  'verduras':'🌿 Verduras',
  'huevos':'🥚 Huevos',
  'asian':'🌏 Asiática',
  'magreb':'🫕 Magreb',
  'entrantes':'🫑 Entrantes',
  'salsas':'🫙 Salsas'
};

function renderFiltros() {
  var html = '';
  var keys = Object.keys(CATS);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    html += '<button class="ftag'+(filtroAct===k?' on':'')+'" data-f="'+k+'">'+CATS[k]+'</button>';
  }
  document.getElementById('filtros').innerHTML = html;
  document.getElementById('filtros').onclick = function(e) {
    var t = e.target;
    if (t.classList.contains('ftag')) {
      filtroAct = t.getAttribute('data-f');
      renderFiltros(); renderRecetario();
    }
  };
}

function renderRecetario() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var keys = Object.keys(RECETAS);
  var html = '';
  var count = 0;
  for (var i = 0; i < keys.length; i++) {
    var nom = keys[i];
    var r = RECETAS[nom];
    var matchF = filtroAct === 'todo' ||
                 filtroAct === r.tipo ||
                 filtroAct === r.cat;
    var matchQ = !q || nom.toLowerCase().indexOf(q) !== -1;
    if (!matchF || !matchQ) continue;
    count++;
    var tagTxt = r.tipo === 'dieta' ? 'Dieta' : r.tipo === 'finde' ? 'Finde' : 'Recetario';
    var tagCls = 'tag-'+r.tipo;
    html += '<div class="rec-card" data-r="'+nom+'">';
    html += '<div class="rec-emoji">'+r.emoji+'</div>';
    html += '<div class="rec-info"><div class="rec-nom">'+nom+'</div>';
    html += '<div class="rec-sub"><span class="rec-tag '+tagCls+'">'+tagTxt+'</span></div></div>';
    html += '<div class="rec-arr">›</div>';
    html += '</div>';
  }
  if (count === 0) {
    html = '<div class="empty"><div class="e-ico">🔍</div><p>No se encontraron recetas</p></div>';
  }
  document.getElementById('listaRecetas').innerHTML = html;
  document.getElementById('listaRecetas').onclick = function(e) {
    var el = e.target;
    while (el && el !== this) {
      if (el.classList.contains('rec-card')) {
        abrirReceta(el.getAttribute('data-r')); return;
      }
      el = el.parentElement;
    }
  };
}

// ── MODAL RECETA ─────────────────────────────────────────────
function abrirReceta(nom) {
  var r = RECETAS[nom];
  if (!r) return;
  document.getElementById('mTit').textContent = nom;
  var html = '<div class="m-sec"><h4>Ingredientes</h4>';
  for (var i = 0; i < r.ing.length; i++) {
    html += '<div class="ing"><span>'+r.ing[i][0]+'</span><span class="ing-c">'+r.ing[i][1]+'</span></div>';
  }
  html += '</div>';
  html += '<div class="m-sec"><h4>Preparación</h4><div class="pasos">';
  for (var j = 0; j < r.pasos.length; j++) {
    html += '<div class="paso">'+r.pasos[j]+'</div>';
  }
  html += '</div></div>';
  if (r.alerg) {
    var chips = r.alerg.split(',');
    html += '<div class="m-sec"><h4>Alérgenos</h4><div class="chips">';
    for (var k = 0; k < chips.length; k++) {
      html += '<span class="chip">'+chips[k].trim()+'</span>';
    }
    html += '</div></div>';
  }
  document.getElementById('mBody').innerHTML = html;
  document.getElementById('overlay').classList.add('on');
}
function cerrarOverlay(e) { if (e.target===document.getElementById('overlay')) cerrarModal(); }
function cerrarModal() { document.getElementById('overlay').classList.remove('on'); }

// ── NUEVA SEMANA ─────────────────────────────────────────────
function nuevaSemana() {
  guardarSemanaEnHistorial(menuIdx);
  generarMenuSemana();
  semana++;
  checks = {};
  diaAct = 0;
  renderTabs(); renderDia(0); renderCompra();
  toast('¡Nueva semana generada 🎉');
}

// ── NAVEGACIÓN ───────────────────────────────────────────────
function nav(v) {
  document.getElementById('vMenu').className    = 'vista'+(v==='menu'    ?' on':'');
  document.getElementById('vCompra').className  = 'vista'+(v==='compra'  ?' on':'');
  document.getElementById('vRecetario').className='vista'+(v==='recetario'?' on':'');
  document.getElementById('tabs').style.display = v==='menu'?'flex':'none';
  document.getElementById('btnM').className = 'hbtn'+(v==='menu'    ?' on':'');
  document.getElementById('btnC').className = 'hbtn'+(v==='compra'  ?' on':'');
  document.getElementById('btnR').className = 'hbtn'+(v==='recetario'?' on':'');
  document.getElementById('fab').className  = v==='menu'?'fab':'fab fab-hidden';
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast on';
  setTimeout(function(){ t.className='toast'; }, 2500);
}

// ── INIT ──────────────────────────────────────────────────────
generarMenuSemana();
renderTabs(); renderDia(0); renderCompra();
renderFiltros(); renderRecetario();
</script>
